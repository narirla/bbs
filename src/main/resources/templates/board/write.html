<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글 작성</title>
</head>
<body>
<h1>게시글 작성</h1>
  <form th:action="@{/board/write}" method="post">
    <label>제목: <input type="text" name="title" required></label><br>
    <label>작성자: <input type="text" name="writer" required></label><br>
    <label>내용:<br><textarea name="content" required></textarea></label><br>
    <button type="submit">작성</button>
  </form>
  <a th:href="@{/board/list}">목록으로</a>
</body>
</html>
